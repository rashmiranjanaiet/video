services:
  - type: web
    name: novalink-backend
    env: node
    plan: free
    rootDir: novalink-ai
    buildCommand: npm ci && npm run build --workspace=backend
    startCommand: npm start --workspace=backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: novalink-frontend
    env: node
    plan: free
    rootDir: novalink-ai
    buildCommand: npm ci && npm run build --workspace=frontend
    startCommand: npm start --workspace=frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
